cors:
  allowed-origins:
    - http://localhost:5173
    - http://localhost:3000

spring:
  jpa:
    hibernate:
      ddl-auto: validate   # Flyway가 스키마 관리 → JPA는 검증만
    show-sql: true

  batch:
    jdbc:
      initialize-schema: always

logging:
  level:
    com.rheon.royale: DEBUG
    org.springframework.batch: DEBUG
