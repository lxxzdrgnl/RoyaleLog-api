spring:
  profiles:
    active: local

  application:
    version: 1.0.0
    build-time: "@buildTime@"   # Gradle processResources 필터링으로 주입

  threads:
    virtual:
      enabled: true   # JDK 21 Virtual Thread — I/O bound 배치 작업 처리량 향상

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:royalelog}
    username: ${DB_USER:royale}
    password: ${DB_PASSWORD:royale}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 3000ms

  batch:
    job:
      enabled: false          # Airflow가 트리거 — 앱 시작 시 자동 실행 비활성화
    jdbc:
      initialize-schema: always

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true   # 기존 DB가 있어도 마이그레이션 시작 가능

# 슈퍼셀 Clash Royale 공식 API
clash:
  api:
    base-url: https://api.clashroyale.com/v1
    token: ${CLASH_API_TOKEN}
    rate-limit: 60            # 초당 최대 요청 수 (실측 burst ~95, 60으로 안전 마진)
    retry-max: 3              # 429/5xx 재시도 횟수

# FastAPI ML 서빙 서버
ml:
  server:
    base-url: ${ML_SERVER_URL:http://royalelog-worker:8000}
    timeout-ms: 50            # 초과 시 stats_daily Fallback

# 캐시 TTL
cache:
  ttl:
    tier-list: 3600           # 티어표: 1시간 (초 단위)
    player-battle-log: 300    # 유저 전적: 5분

# CORS
cors:
  allowed-origins:
    - ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, info
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
