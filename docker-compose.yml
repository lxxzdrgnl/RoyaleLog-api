services:

  # ── PostgreSQL ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: royalelog-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-royalelog}
      POSTGRES_USER: ${DB_USER:-royale}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    shm_size: '2gb'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-royale} -d ${DB_NAME:-royalelog}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: royalelog-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Server (port 8080) ─────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: royalelog-api
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Batch Server (port 8081) ───────────────────────────────────────
  batch:
    build:
      context: ./batch
      dockerfile: Dockerfile
    container_name: royalelog-batch
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── ML Worker (port 8082) ────────────────────────────────────────
  worker:
    build:
      context: ../RoyaleLog-worker
      dockerfile: Dockerfile
    container_name: royalelog-worker
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8082:8082"
    volumes:
      - worker-models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started

  # ── MLflow Tracking Server ───────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: royalelog-mlflow
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --backend-store-uri postgresql://${DB_USER:-royale}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-royalelog}
      --default-artifact-root /mlruns
      --host 0.0.0.0
    volumes:
      - mlflow-artifacts:/mlruns
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  worker-models:
  mlflow-artifacts:
