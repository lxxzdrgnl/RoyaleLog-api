spring:
  profiles:
    active: local
  application:
    version: 1.0.0
    build-time: "@buildTime@"
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:royalelog}
    username: ${DB_USER:royale}
    password: ${DB_PASSWORD:royale}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 3000ms
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

clash:
  api:
    base-url: https://api.clashroyale.com/v1
    token: ${CLASH_API_TOKEN}
    rate-limit: 120
    retry-max: 3

ml:
  server:
    base-url: ${ML_SERVER_URL:http://royalelog-worker:8000}
    timeout-ms: 50

cache:
  ttl:
    tier-list: 3600
    player-battle-log: 300

stats:
  bayes-prior-count: 500   # Bayesian C 파라미터 (재시작으로 튜닝)

cors:
  allowed-origins:
    - ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, info
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
