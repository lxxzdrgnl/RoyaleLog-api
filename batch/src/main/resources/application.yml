spring:
  profiles:
    active: local
  application:
    version: 1.0.0
    build-time: "@buildTime@"
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:royalelog}
    username: ${DB_USER:royale}
    password: ${DB_PASSWORD:royale}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 3000ms
  flyway:
    enabled: false

server:
  port: 8081

clash:
  api:
    base-url: https://api.clashroyale.com/v1
    token: ${CLASH_API_TOKEN}
    rate-limit: 120
    retry-max: 3

collector:
  max-players-per-bracket: 20000   # 브라켓별 최대 조회 플레이어 수
  bracket:
    max-trophy-low: 50000          # arena_01~10 최대 수집 건수
    max-trophy: 100000             # arena_11~28 최대 수집 건수
    max-pol: 100000                # PoL 리그별 최대 수집 건수
    max-special: 300000            # trail/tournament 등 특수모드 최대 수집 건수

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, info
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
